<!DOCTYPE html>
<html>
<head><title>Excel Data</title></head>
<body>
    <h2>Data from Excel Sheet</h2>
    <table border="1">
        {% for row in excel_data %}
        <tr>
            {% for cell in row %}
            <td>{{ cell|default:"-" }}</td>
            {% endfor %}
        </tr>
        {% endfor %}
    </table>
</body>
</html>
